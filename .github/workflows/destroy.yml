name: Destroy Helm Release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER_NAME: end-to-end-devops-dev-eks
  HELM_RELEASE: end-to-end-devops
  HELM_NAMESPACE: end-to-end-devops
  INGRESS_RELEASE: ingress-nginx
  INGRESS_NAMESPACE: ingress-nginx

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region "${AWS_REGION}" --name "${EKS_CLUSTER_NAME}"

      - name: Uninstall ingress controller
        run: |
          helm uninstall "${INGRESS_RELEASE}" -n "${INGRESS_NAMESPACE}" || true
          kubectl delete namespace "${INGRESS_NAMESPACE}" --wait=false || true

      - name: Uninstall Helm chart
        run: |
          helm uninstall "${HELM_RELEASE}" -n "${HELM_NAMESPACE}" || true
          kubectl delete namespace "${HELM_NAMESPACE}" --wait=false || true

      - name: Verify cleanup
        run: |
          helm list -n "${HELM_NAMESPACE}" || true
          kubectl get ns || true
