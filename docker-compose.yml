services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: docker/auth-service.Dockerfile
    environment:
      PORT: 4000
      JWT_SECRET: secret
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy

  orders-service:
    image: end-to-end-devops-orders-service:local
    build:
      context: .
      dockerfile: docker/orders-service.Dockerfile
    environment:
      PORT: 7000
      RABBITMQ_URL: amqp://rabbitmq
    ports:
      - "7000:7000"
    depends_on:
      rabbitmq:
        condition: service_healthy

  order-consumer:
    image: end-to-end-devops-orders-service:local
    command: ["node", "src/queue/consumer.js"]
    environment:
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
      orders-service:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: docker/api-gateway.Dockerfile
    environment:
      PORT: 5000
      JWT_SECRET: secret
      ORDER_SERVICE_URL: http://orders-service:7000
    ports:
      - "5000:5000"
    depends_on:
      orders-service:
        condition: service_started
      auth-service:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    environment:
      GATEWAY_SERVICE_URL: http://api-gateway:5000
      AUTH_SERVICE_URL: http://auth-service:4000
      ORDERS_SERVICE_URL: http://orders-service:7000
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_started
